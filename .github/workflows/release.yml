name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg
        run: choco install ffmpeg -y --no-progress

      - name: Bundle ffmpeg.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $ffmpegCandidates = Get-ChildItem -Path "$env:ChocolateyInstall\lib" -Filter "ffmpeg.exe" -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\tools\\.*\\bin\\ffmpeg\.exe$" }

          if (-not $ffmpegCandidates) {
            Write-Error "Could not find FFmpeg binary in Chocolatey package files."
            exit 1
          }

          $ffmpegFile = $ffmpegCandidates | Sort-Object Length -Descending | Select-Object -First 1
          if ($ffmpegFile.Length -lt 50MB) {
            Write-Error "Resolved FFmpeg binary is too small ($($ffmpegFile.Length) bytes). This usually means a shim was selected."
            exit 1
          }

          Copy-Item $ffmpegFile.FullName "bin/ffmpeg.exe" -Force
          $bundled = Get-Item "bin/ffmpeg.exe"
          Write-Host "Bundled FFmpeg: $($bundled.FullName) ($([Math]::Round($bundled.Length / 1MB, 2)) MB)"

      - name: Download yt-dlp
        shell: pwsh
        env:
          YTDLP_VERSION: '2025.01.15'
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $baseUrl = "https://github.com/yt-dlp/yt-dlp/releases/download/$env:YTDLP_VERSION"
          Invoke-WebRequest -Uri "$baseUrl/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"
          Invoke-WebRequest -Uri "$baseUrl/SHA2-256SUMS" -OutFile "bin/SHA2-256SUMS"

          $checksumLine = Select-String -Path "bin/SHA2-256SUMS" -Pattern '^([a-fA-F0-9]{64})\s+\*?yt-dlp\.exe$' | Select-Object -First 1
          if (-not $checksumLine) {
            Write-Error "Could not find checksum for yt-dlp.exe in SHA2-256SUMS"
            exit 1
          }

          $expectedHash = $checksumLine.Matches[0].Groups[1].Value.ToUpper()
          $actualHash = (Get-FileHash -Algorithm SHA256 "bin/yt-dlp.exe").Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "SHA-256 mismatch for yt-dlp.exe: expected $expectedHash, got $actualHash"
            exit 1
          }

      - name: Build Windows installer and portable
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated executables
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "release" -Filter "*.exe" -File -Recurse
          if (-not $exeFiles) {
            Write-Error "No .exe files found in release/"
            exit 1
          }
          $exeFiles | Select-Object FullName, Length

          $packagedFfmpeg = Get-ChildItem -Path "release" -Filter "ffmpeg.exe" -File -Recurse |
            Where-Object { $_.FullName -match "\\resources\\bin\\ffmpeg\.exe$" } |
            Select-Object -First 1
          if (-not $packagedFfmpeg) {
            Write-Error "Packaged FFmpeg was not found under release/**/resources/bin/ffmpeg.exe"
            exit 1
          }
          if ($packagedFfmpeg.Length -lt 50MB) {
            Write-Error "Packaged FFmpeg is too small ($($packagedFfmpeg.Length) bytes)."
            exit 1
          }
          Write-Host "Packaged FFmpeg size: $([Math]::Round($packagedFfmpeg.Length / 1MB, 2)) MB"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/StreamFetch-Setup-*.exe
            release/StreamFetch-Portable-*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
