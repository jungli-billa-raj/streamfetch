name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp
        shell: pwsh
        env:
          YTDLP_VERSION: '2025.01.15'
          YTDLP_SHA256: 'b6fbe32ef99e16fed028d4db7bc5e25b50e9c9b01c2fe47da1bfd8e63e99e424'
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $url = "https://github.com/yt-dlp/yt-dlp/releases/download/$env:YTDLP_VERSION/yt-dlp.exe"
          Invoke-WebRequest -Uri $url -OutFile "bin/yt-dlp.exe"
          $hash = (Get-FileHash -Algorithm SHA256 "bin/yt-dlp.exe").Hash
          if ($hash -ne $env:YTDLP_SHA256.ToUpper()) {
            Write-Error "SHA-256 mismatch for yt-dlp.exe: expected $($env:YTDLP_SHA256.ToUpper()), got $hash"
            exit 1
          }

      - name: Build Windows installer and portable
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated executables
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path "release" -Filter "*.exe" -File -Recurse
          if (-not $exeFiles) {
            Write-Error "No .exe files found in release/"
            exit 1
          }
          $exeFiles | Select-Object FullName, Length

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
